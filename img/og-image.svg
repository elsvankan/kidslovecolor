<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="-50" cy="-50" r="300" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1250" cy="680" r="350" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="50" r="200" fill="rgba(255,255,255,0.04)"/>

  <!-- White card area -->
  <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#card)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Emoji coloring palette icon -->
  <text x="100" y="190" font-size="120" font-family="sans-serif">🎨</text>

  <!-- Main headline NL -->
  <text x="270" y="185" font-family="'Nunito', 'Arial Black', sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-1">Gratis Kleurplaten</text>
  <text x="270" y="265" font-family="'Nunito', 'Arial Black', sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-1">voor Kinderen</text>

  <!-- Subtitle -->
  <text x="270" y="330" font-family="'Nunito', Arial, sans-serif" font-weight="700" font-size="36" fill="rgba(255,255,255,0.85)">Print &amp; Download — 100% Gratis</text>

  <!-- Divider line -->
  <line x1="270" y1="360" x2="1080" y2="360" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Category badges -->
  <!-- Animals badge -->
  <rect x="270" y="385" width="165" height="52" rx="26" fill="rgba(255,255,255,0.2)"/>
  <text x="353" y="419" text-anchor="middle" font-family="sans-serif" font-size="24" fill="white">🐾 Dieren</text>

  <!-- Vehicles badge -->
  <rect x="450" y="385" width="200" height="52" rx="26" fill="rgba(255,255,255,0.2)"/>
  <text x="550" y="419" text-anchor="middle" font-family="sans-serif" font-size="24" fill="white">🚗 Voertuigen</text>

  <!-- Princesses badge -->
  <rect x="665" y="385" width="225" height="52" rx="26" fill="rgba(255,255,255,0.2)"/>
  <text x="778" y="419" text-anchor="middle" font-family="sans-serif" font-size="24" fill="white">👑 Prinsessen</text>

  <!-- Seasons badge -->
  <rect x="905" y="385" width="180" height="52" rx="26" fill="rgba(255,255,255,0.2)"/>
  <text x="995" y="419" text-anchor="middle" font-family="sans-serif" font-size="24" fill="white">🌸 Seizoenen</text>

  <!-- Bottom URL -->
  <text x="600" y="530" text-anchor="middle" font-family="'Nunito', Arial, sans-serif" font-weight="800" font-size="32" fill="rgba(255,255,255,0.7)" letter-spacing="1">kidslovecolor.com</text>
</svg>
