<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>联系我们 – KidsLoveColor.com</title>
  <meta name="theme-color" content="#FF6B6B"/>
  <link rel="icon" href="/img/logo.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: #F8F9FA;
      color: #2D3436;
      line-height: 1.7;
      font-size: 16px;
    }
    .page-header {
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8787 100%);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .page-header a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .page-header .logo-link { font-size: 1.1rem; }
    .page-header .logo-link img { height: 40px; width: auto; }
    .page-header .back-link { opacity: 0.9; font-weight: 600; }
    .page-header .back-link:hover { opacity: 1; }
    .page-content {
      max-width: 760px;
      margin: 2rem auto;
      padding: 2rem 1.5rem;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(255,107,107,0.08);
    }
    .page-content h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #FF6B6B;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }
    .page-content h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2D3436;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    .page-content p {
      margin-bottom: 1rem;
      color: #636E72;
    }
    .page-content a {
      color: #FF6B6B;
      text-decoration: underline;
      text-decoration-color: rgba(255,107,107,0.3);
    }
    .page-content a:hover {
      text-decoration-color: #FF6B6B;
    }
    .page-content strong { color: #2D3436; }
    .page-content em { color: #636E72; }
    /* Contact form */
    .contact-form {
      margin: 1.5rem 0;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #2D3436;
      font-size: 0.95rem;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #E8EAED;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      color: #2D3436;
      background: #F8F9FA;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #FF6B6B;
      background: #fff;
    }
    .btn.btn-primary {
      background: linear-gradient(135deg, #FF6B6B, #FF8787);
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn.btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(255,107,107,0.3);
    }
    .contact-note {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #E8EAED;
      font-size: 0.9rem;
    }
    .page-footer {
      text-align: center;
      padding: 1.5rem 1.25rem;
      color: #636E72;
      font-size: 0.85rem;
    }
    .page-footer a {
      color: #FF6B6B;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      .page-content {
        margin: 1rem;
        padding: 1.5rem 1.25rem;
      }
      .page-content h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <a href="/zh/" class="logo-link">
    <img src="/img/logo.svg" alt="KidsLoveColor" height="40"/>
    KidsLoveColor
  </a>
  <a href="/zh/" class="back-link">&larr; 返回涂色页</a>
</header>

<main class="page-content">
  <h1>联系我们</h1>
  
        <p>
          有问题、建议或评论？我们很乐意听到您的声音！
          请填写下面的表格，我们会尽快回复。
        </p>
        <form class="contact-form" action="mailto:elsvankan@gmail.com" method="POST" enctype="text/plain">
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required placeholder="您的姓名"/>
          </div>
          <div class="form-group">
            <label for="email">电子邮箱</label>
            <input type="email" id="email" name="email" required placeholder="you@email.com"/>
          </div>
          <div class="form-group">
            <label for="subject">主题</label>
            <input type="text" id="subject" name="subject" required placeholder="您的消息是关于什么？"/>
          </div>
          <div class="form-group">
            <label for="message">消息</label>
            <textarea id="message" name="message" rows="6" required placeholder="在这里输入您的消息..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">发送消息</button>
        </form>
        <p class="contact-note">
          您也可以直接通过电子邮件联系我们：
          <a href="mailto:elsvankan@gmail.com">elsvankan@gmail.com</a>
        </p>
</main>

<footer class="page-footer">
  <p>© 2025 KidsLoveColor.com — 免费涂色页供个人使用</p>
</footer>

</body>
</html>
