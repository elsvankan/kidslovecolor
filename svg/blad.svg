<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="white" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
  <!-- Main stem/petiole -->
  <path d="M150,270 Q148,240 150,210" stroke-width="5"/>
  <!-- Twig connection -->
  <path d="M150,270 Q165,278 182,268" stroke-width="4" fill="none"/>
  <path d="M182,268 Q196,265 205,270" stroke-width="3" fill="none"/>
  <!-- Main maple leaf shape -->
  <path d="M150,210
    Q155,195 168,185
    Q178,178 188,182
    Q192,172 185,162
    Q195,162 202,155
    Q196,148 188,150
    Q192,138 186,130
    Q178,134 176,144
    Q168,132 158,132
    Q154,122 150,115
    Q146,122 142,132
    Q132,132 124,144
    Q122,134 114,130
    Q108,138 112,150
    Q104,148 98,155
    Q105,162 115,162
    Q108,172 112,182
    Q122,178 132,185
    Q145,195 150,210 Z"/>
  <!-- Center vein -->
  <line x1="150" y1="210" x2="150" y2="120" stroke-width="2"/>
  <!-- Left main vein 1 (to top-left lobe) -->
  <path d="M150,185 Q138,165 124,144" fill="none" stroke-width="2"/>
