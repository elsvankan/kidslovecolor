  <path d="M150,160 Q140,148 130,140" fill="none" stroke-width="1.5"/>
  <!-- Upper right vein -->
  <path d="M150,160 Q160,148 170,140" fill="none" stroke-width="1.5"/>
  <!-- Top left vein to tip -->
  <path d="M148,145 Q144,132 142,122" fill="none" stroke-width="1.5"/>
  <!-- Top right vein to tip -->
  <path d="M152,145 Q156,132 158,122" fill="none" stroke-width="1.5"/>
  <!-- Small sub-veins left -->
  <path d="M136,168 Q130,165 124,168" fill="none" stroke-width="1"/>
  <path d="M128,152 Q122,150 116,152" fill="none" stroke-width="1"/>
  <!-- Small sub-veins right -->
  <path d="M164,168 Q170,165 176,168" fill="none" stroke-width="1"/>
  <path d="M172,152 Q178,150 184,152" fill="none" stroke-width="1"/>
  <!-- Small sub-veins top -->
  <path d="M146,135 Q140,132 136,135" fill="none" stroke-width="1"/>
  <path d="M154,135 Q160,132 164,135" fill="none" stroke-width="1"/>
