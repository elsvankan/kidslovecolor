  <ellipse cx="62" cy="105" rx="16" ry="22"/>
  <!-- Acorn cap -->
  <path d="M46,106 Q62,95 78,106 Q78,100 62,96 Q46,100 46,106 Z"/>
  <!-- Acorn stem -->
  <line x1="62" y1="94" x2="62" y2="82" stroke-width="3"/>
  <!-- Acorn texture -->
  <path d="M52,108 Q62,104 72,108" fill="none" stroke-width="1.5"/>
  <path d="M50,114 Q62,110 74,114" fill="none" stroke-width="1.5"/>
  <path d="M50,120 Q62,116 74,120" fill="none" stroke-width="1.5"/>
  <!-- Small mushroom -->
  <path d="M228,250 Q228,235 240,232 Q252,235 252,250 Z"/>
  <rect x="234" y="250" width="12" height="22" rx="3"/>
  <!-- Mushroom spots -->
  <circle cx="238" cy="237" r="3" fill="none" stroke-width="1.5"/>
  <circle cx="245" cy="234" r="3" fill="none" stroke-width="1.5"/>
  <circle cx="248" cy="241" r="3" fill="none" stroke-width="1.5"/>
