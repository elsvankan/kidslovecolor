  <rect x="85" y="248" width="38" height="45" rx="14"/>
  <!-- Front right leg -->
  <rect x="142" y="252" width="38" height="44" rx="14"/>
  <!-- Back left leg -->
  <rect x="195" y="250" width="38" height="45" rx="14"/>
  <!-- Tail -->
  <path d="M242,180 Q268,175 270,192 Q272,205 260,210" fill="none" stroke-width="4"/>
  <!-- Tail tuft -->
  <path d="M255,207 Q260,218 252,224" fill="none" stroke-width="3"/>
  <path d="M258,209 Q265,218 258,226" fill="none" stroke-width="3"/>
  <path d="M261,210 Q270,217 265,226" fill="none" stroke-width="3"/>
  <!-- Wrinkle on trunk -->
  <path d="M50,185 Q55,182 60,185" fill="none" stroke-width="1.5"/>
  <path d="M48,198 Q55,195 62,198" fill="none" stroke-width="1.5"/>
  <path d="M48,212 Q55,209 62,212" fill="none" stroke-width="1.5"/>
  <!-- Toenails -->
  <ellipse cx="99" cy="290" rx="7" ry="4"/>
  <ellipse cx="113" cy="291" rx="7" ry="4"/>
  <ellipse cx="127" cy="290" rx="7" ry="4"/>
