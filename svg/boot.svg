  <path d="M15,265 Q35,255 55,265 Q75,275 95,265 Q115,255 135,265 Q155,275 175,265 Q195,255 215,265 Q235,275 255,265 Q270,257 285,265" fill="none" stroke-width="2"/>
  <!-- Anchor symbol -->
  <circle cx="170" cy="205" r="5"/>
  <line x1="170" y1="210" x2="170" y2="220" stroke-width="2"/>
  <line x1="163" y1="218" x2="177" y2="218" stroke-width="2"/>
