<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="white" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
  <!-- Road line -->
  <line x1="15" y1="248" x2="285" y2="248" stroke-width="2" stroke-dasharray="12,8"/>
  <!-- Car body lower -->
  <path d="M28,200 Q28,240 50,242 L250,242 Q272,242 272,200 Z"/>
  <!-- Car body upper -->
  <path d="M72,200 Q85,155 115,145 L185,145 Q215,155 228,200 Z"/>
  <!-- Windshield -->
  <path d="M88,198 Q96,162 118,153 L145,153 L145,198 Z" fill="#e8f4ff"/>
  <!-- Rear window -->
  <path d="M155,198 L155,153 L182,153 Q204,162 212,198 Z" fill="#e8f4ff"/>
  <!-- Window divider -->
  <line x1="145" y1="153" x2="155" y2="153" stroke-width="3"/>
  <line x1="145" y1="153" x2="145" y2="200" stroke-width="3"/>
  <line x1="155" y1="153" x2="155" y2="200" stroke-width="3"/>
  <!-- Door line -->
  <path d="M105,200 L105,240" stroke-width="2"/>
  <path d="M195,200 L195,240" stroke-width="2"/>
  <!-- Door handle left -->
  <rect x="115" y="218" width="18" height="6" rx="3"/>
  <!-- Door handle right -->
  <rect x="167" y="218" width="18" height="6" rx="3"/>
  <!-- Front wheel arch -->
  <path d="M28,240 Q28,210 60,210 Q92,210 92,240"/>
  <!-- Rear wheel arch -->
  <path d="M208,240 Q208,210 240,210 Q272,210 272,240"/>
  <!-- Front wheel -->
  <circle cx="60" cy="246" r="28"/>
  <circle cx="60" cy="246" r="16"/>
  <circle cx="60" cy="246" r="6" fill="#333" stroke="none"/>
  <!-- Wheel spokes front -->
  <line x1="60" y1="230" x2="60" y2="262" stroke-width="2"/>
  <line x1="44" y1="246" x2="76" y2="246" stroke-width="2"/>
  <line x1="49" y1="235" x2="71" y2="257" stroke-width="2"/>
  <line x1="71" y1="235" x2="49" y2="257" stroke-width="2"/>
  <!-- Rear wheel -->
  <circle cx="240" cy="246" r="28"/>
  <circle cx="240" cy="246" r="16"/>
  <circle cx="240" cy="246" r="6" fill="#333" stroke="none"/>
  <!-- Wheel spokes rear -->
  <line x1="240" y1="230" x2="240" y2="262" stroke-width="2"/>
  <line x1="224" y1="246" x2="256" y2="246" stroke-width="2"/>
  <line x1="229" y1="235" x2="251" y2="257" stroke-width="2"/>
  <line x1="251" y1="235" x2="229" y2="257" stroke-width="2"/>
  <!-- Headlight -->
  <ellipse cx="268" cy="215" rx="10" ry="8"/>
  <!-- Taillight -->
  <rect x="25" y="208" width="12" height="10" rx="3"/>
  <!-- Bumper front -->
  <path d="M265,238 Q272,242 272,248" fill="none" stroke-width="4"/>
  <!-- Bumper rear -->
  <path d="M35,238 Q28,242 28,248" fill="none" stroke-width="4"/>
  <!-- Roof -->
  <path d="M88,200 L212,200" stroke-width="2.5"/>
  <!-- Windshield wipers -->
  <path d="M100,155 Q120,148 145,153" fill="none" stroke-width="2"/>
  <!-- Side stripe decoration -->
  <path d="M95,222 Q150,218 205,222" fill="none" stroke-width="1.5"/>
</svg>
